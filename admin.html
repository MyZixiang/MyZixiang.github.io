<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QQ 二维码后台管理</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #eef5ff, #ffffff);
      color: #1f2937;
    }

    .card {
      width: min(92vw, 460px);
      padding: 32px 24px;
      text-align: center;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    .title {
      margin: 0 0 20px;
      font-size: 24px;
      font-weight: 700;
    }

    .form-group {
      margin-top: 18px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    .form-group input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    .form-group input:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.12);
    }

    .qr-image {
      width: 260px;
      max-width: 100%;
      height: 260px;
      object-fit: contain;
      margin-top: 10px;
      padding: 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 14px 18px;
      border: 0;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .primary {
      margin-top: 22px;
      background: #1677ff;
      color: #ffffff;
      box-shadow: 0 10px 22px rgba(22, 119, 255, 0.24);
    }

    .primary:hover { background: #0f63d8; }

    .secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .secondary:hover { background: #e5e7eb; }

    .danger {
      background: #fee2e2;
      color: #b91c1c;
    }

    .danger:hover { background: #fecaca; }

    .tip {
      margin: 14px 0 0;
      min-height: 22px;
      font-size: 14px;
      color: #16a34a;
      line-height: 1.5;
    }

    .error { color: #dc2626; }

    .note {
      margin: 18px 0 0;
      padding: 12px;
      border-radius: 12px;
      background: #f9fafb;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
      text-align: left;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <section id="loginBox">
      <h1 class="title">后台登录</h1>

      <div class="form-group">
        <label for="emailInput">管理员邮箱</label>
        <input id="emailInput" type="email" placeholder="请输入管理员邮箱" />
      </div>

      <div class="form-group">
        <label for="passwordInput">管理密码</label>
        <input id="passwordInput" type="password" placeholder="请输入管理密码" />
      </div>

      <button class="primary" id="loginButton">登录后台</button>
      <p class="tip" id="loginTip"></p>
    </section>

    <section id="adminBox" class="hidden">
      <h1 class="title">QQ 信息管理</h1>

      <div class="form-group">
        <label for="qqInput">QQ 号</label>
        <input id="qqInput" type="text" placeholder="请输入 QQ 号" />
      </div>

      <div class="form-group">
        <label for="qrInput">更换二维码图片</label>
        <input id="qrInput" type="file" accept="image/*" />
      </div>

      <p class="tip">当前二维码预览</p>
     <img class="qr-image" id="qrPreview" alt="QQ二维码预览" />

      <button class="primary" id="saveButton">保存修改</button>
      <button class="secondary" id="openFrontButton">打开前台页面</button>
      <button class="danger" id="logoutButton">退出后台</button>

      <p class="tip" id="adminTip"></p>

      <div class="note">
        保存后，所有访客打开前台都会读取 Supabase 云端最新内容。<br />
        建议二维码图片小于 1MB。
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 这里换成你自己的 Supabase 项目信息
    const SUPABASE_URL = "https://titerffyuwgosbrvfash.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_zqBKbdxgNpOkHi3ILUfgaQ_ZB3xvUO1";

    const DEFAULT_QQ_NUMBER = "123456789";
  const DEFAULT_QR_IMAGE = "";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginBox = document.getElementById("loginBox");
    const adminBox = document.getElementById("adminBox");

    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginButton = document.getElementById("loginButton");
    const logoutButton = document.getElementById("logoutButton");

    const qqInput = document.getElementById("qqInput");
    const qrInput = document.getElementById("qrInput");
    const qrPreview = document.getElementById("qrPreview");

    const saveButton = document.getElementById("saveButton");
    const openFrontButton = document.getElementById("openFrontButton");

    const loginTip = document.getElementById("loginTip");
    const adminTip = document.getElementById("adminTip");

    let selectedFile = null;
    let currentQrImageUrl = DEFAULT_QR_IMAGE;

    function showAdmin() {
      loginBox.classList.add("hidden");
      adminBox.classList.remove("hidden");
    }

    function showLogin() {
      adminBox.classList.add("hidden");
      loginBox.classList.remove("hidden");
    }

    async function loadSettings() {
      const { data, error } = await client
        .from("site_config")
        .select("qq_number, qr_image_url")
        .eq("id", 1)
        .single();

      if (error) {
        adminTip.classList.add("error");
        adminTip.textContent = "读取配置失败，请检查数据库表和权限";
        return;
      }

      qqInput.value = data.qq_number || DEFAULT_QQ_NUMBER;
      currentQrImageUrl = data.qr_image_url || DEFAULT_QR_IMAGE;
      qrPreview.src = currentQrImageUrl;
    }

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        loginTip.classList.add("error");
        loginTip.textContent = "请输入邮箱和密码";
        return;
      }

      const { error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        loginTip.classList.add("error");
        loginTip.textContent = "登录失败，请检查邮箱或密码";
        return;
      }

      loginTip.textContent = "";
    }

    async function uploadQrImageIfNeeded() {
      if (!selectedFile) return currentQrImageUrl;

      const fileExt = selectedFile.name.split(".").pop() || "png";
      const fileName = `qrcode-${Date.now()}.${fileExt}`;

      const { error: uploadError } = await client.storage
        .from("qrcode")
        .upload(fileName, selectedFile, {
          cacheControl: "3600",
          upsert: false
        });

      if (uploadError) throw uploadError;

      const { data } = client.storage
        .from("qrcode")
        .getPublicUrl(fileName);

      return data.publicUrl;
    }

    async function saveSettings() {
      const qqNumber = qqInput.value.trim();

      if (!qqNumber) {
        adminTip.classList.add("error");
        adminTip.textContent = "QQ 号不能为空";
        return;
      }

      saveButton.disabled = true;
      saveButton.textContent = "保存中...";

      try {
        const qrImageUrl = await uploadQrImageIfNeeded();

        const { error } = await client
          .from("site_config")
          .update({
            qq_number: qqNumber,
            qr_image_url: qrImageUrl,
            updated_at: new Date().toISOString()
          })
          .eq("id", 1);

        if (error) throw error;

        currentQrImageUrl = qrImageUrl;
        selectedFile = null;
        qrInput.value = "";

        adminTip.classList.remove("error");
        adminTip.textContent = "保存成功，所有访客刷新前台即可看到最新内容";
      } catch (error) {
        console.error(error);
        adminTip.classList.add("error");
        adminTip.textContent = "保存失败，请检查 Supabase 权限、Storage bucket 或管理员邮箱";
      } finally {
        saveButton.disabled = false;
        saveButton.textContent = "保存修改";
      }
    }

    qrInput.addEventListener("change", function () {
      const file = qrInput.files[0];
      if (!file) return;

      if (!file.type.startsWith("image/")) {
        adminTip.classList.add("error");
        adminTip.textContent = "请选择图片文件";
        return;
      }

      if (file.size > 1024 * 1024) {
        adminTip.classList.add("error");
        adminTip.textContent = "图片太大，请选择小于 1MB 的二维码图片";
        return;
      }

      selectedFile = file;
      qrPreview.src = URL.createObjectURL(file);

      adminTip.classList.remove("error");
      adminTip.textContent = "图片已选择，点击保存后生效";
    });

    loginButton.addEventListener("click", login);

    passwordInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") login();
    });

    saveButton.addEventListener("click", saveSettings);

    logoutButton.addEventListener("click", async function () {
      await client.auth.signOut();
    });

    openFrontButton.addEventListener("click", function () {
      window.open("./index.html", "_blank");
    });

    client.auth.onAuthStateChange(async function (_event, session) {
      if (session) {
        showAdmin();
        await loadSettings();
      } else {
        showLogin();
      }
    });
  </script>
</body>
</html>
