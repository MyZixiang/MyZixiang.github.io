<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QQ 二维码</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #eef5ff, #ffffff);
      color: #1f2937;
    }
    .card {
      width: min(94vw, 680px);
      padding: 32px 24px;
      text-align: center;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }
    .title { margin: 0 0 20px; font-size: 28px; font-weight: 700; }
    .qr-image {
      width: min(78vw, 520px);
      height: min(78vw, 520px);
      object-fit: contain;
      padding: 14px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
    }
    .desc { margin: 22px 0 0; font-size: clamp(20px, 4.8vw, 30px); font-weight: 800; color: #dc2626; line-height: 1.5; }
    .copy-button {
      width: 100%;
      margin-top: 24px;
      padding: 14px 18px;
      border: 0;
      border-radius: 999px;
      background: #1677ff;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(22, 119, 255, 0.24);
    }
    .copy-button:hover { background: #0f63d8; }
    .tip { margin: 14px 0 0; min-height: 22px; font-size: 14px; color: #16a34a; line-height: 1.5; }
    .error { color: #dc2626; }

    /* 全程保密发货图片样式 */
    .confidential-image {
      width: 100%;
      max-width: 550px;
      margin: 24px auto 0;
      display: block;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">扫码添加 QQ</h1>

    <img class="qr-image" id="qrImage" src="./qq-qrcode.png" alt="QQ二维码" />

    <p class="desc">手机截图扫描二维码或点击复制QQ号添加QQ</p>

    <button class="copy-button" id="copyButton">点击此处复制QQ号</button>
    <p class="tip" id="tip"></p>

    <!-- 全程保密发货图片 -->
    <img class="confidential-image" src="private.png" alt="全程保密发货" />
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://titerffyuwgosbrvfash.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_zqBKbdxgNpOkHi3ILUfgaQ_ZB3xvUO1";

    const DEFAULT_QQ_NUMBER = "123456789";
    const DEFAULT_QR_IMAGE = "./qq-qrcode.png";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const qrImage = document.getElementById("qrImage");
    const copyButton = document.getElementById("copyButton");
    const tip = document.getElementById("tip");

    let currentQQNumber = DEFAULT_QQ_NUMBER;

    function updatePage(data) {
      currentQQNumber = data?.qq_number || DEFAULT_QQ_NUMBER;
      qrImage.src = data?.qr_image_url || DEFAULT_QR_IMAGE;
    }

    async function loadSettings() {
      try {
        const { data, error } = await client
          .from("site_config")
          .select("qq_number, qr_image_url")
          .eq("id", 1)
          .single();

        if (error) throw error;

        updatePage(data);
      } catch (err) {
        console.error("读取配置失败：", err);
        updatePage(null);
      }
    }

    async function copyQQNumber() {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(currentQQNumber);
        } else {
          const textArea = document.createElement("textarea");
          textArea.value = currentQQNumber;
          textArea.style.position = "fixed";
          textArea.style.left = "-9999px";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          document.execCommand("copy");
          document.body.removeChild(textArea);
        }

        tip.classList.remove("error");
        tip.textContent = `复制成功：${currentQQNumber}`;
        copyButton.textContent = "已复制 QQ 号";

        setTimeout(() => {
          tip.textContent = "";
          copyButton.textContent = "点击此处复制QQ号";
        }, 2000);
      } catch (err) {
        tip.classList.add("error");
        tip.textContent = "复制失败，请手动复制 QQ 号：" + currentQQNumber;
      }
    }

    copyButton.addEventListener("click", copyQQNumber);
    loadSettings();
    setInterval(loadSettings, 30000);
  </script>
</body>
</html>
